# ==================================================================================================================== #
#                                                EXPERIMENT CONFIGURATION                                              # 
# ==================================================================================================================== #


project:
    name: semgaze # name of the wandb project
    version: 1.0.0
    description: SemGaze - Transformer encoder-decoder architecture for gaze target localization and recognition.
    root: /home/elicer/semgaze # FILL ME

# ------------------------------------------------------------------------------------------------------------------- #

experiment:
    name: baseline(2-layers, mse, w=1, edited2) # name of the wandb job
    group: null # name of the wandb group
    task: train+test # combination of {train, val, test} separated by '+' sign
    dataset: gazefollow # gazefollow, gazehoi
    path: ${hydra:runtime.cwd} # to retrieve logs and checkpoints

# ------------------------------------------------------------------------------------------------------------------- #

data:
    num_people: 1 # int or -1 to include all people
    image_size: 256 # 224 -> 256
    heatmap_size: 64 # 56 -> 64
    heatmap_sigma: 3
    return_head_mask: False
    gf:
        root: /home/elicer/semgaze/data/gazefollow_extended # FILL ME
        root_annotations: /home/elicer/semgaze/data/gazefollow_extended # FILL ME
        root_heads: /home/elicer/semgaze/data/GazeFollow-head # FILL ME (if needed)
        reason_txt_root: /home/elicer/semgaze/data/bucket_data/data/gazefollow_reason/output
        reason_feature_root: /home/elicer/semgaze/data/gazefollow_reason/features
        reason_feature_preload: False
        num_train_samples: 108955
        vocab_size: 346
    gazehoi:
        root: /home/elicer/semgaze/data/gazehoi # FILL ME
        num_train_samples: 47044
        vocab_size: 463


# ------------------------------------------------------------------------------------------------------------------- #

model:
    semgaze:
        patch_size: 16
        token_dim: 768
        image_size: ${data.image_size}
        gaze_vec_dim: 2
        image_encoder_name: facebook/dinov3-vitb16-pretrain-lvd1689m
        decoder_depth: 2
        decoder_num_heads: 8
        temp_init_value: 0.07
    pretraining:
        gaze_backbone: /home/elicer/semgaze/weights/gaze360_resnet18.pt # FILL ME
    weights: null # /!\ null (default), or path to a checkpoint (overrides pretraining weights)

# ------------------------------------------------------------------------------------------------------------------- #

loss:
    weight_heatmap: 1000
    weight_angular: 3
    weight_label: 1
    weight_align: 1

# ------------------------------------------------------------------------------------------------------------------- #

alignment:
    enabled: True
    train_only: True
    model_name: BAAI/bge-large-en-v1.5
    text_mode: reasoning_only # object_reasoning, reasoning_only, object_only
    feature_dim: 1024
    layer_index: 1 # 1-based index in decoder transformer depth
    loss_type: mse # cosine, mse, infonce
    head_lr_mult: 3.0
    temp_init_value: 0.07 # used when loss_type=infonce
    reason_log_limit: 20

# ------------------------------------------------------------------------------------------------------------------- #

optimizer:
    lr: 2e-4
    weight_decay: 3e-3

# ------------------------------------------------------------------------------------------------------------------- #

scheduler:
    type: cosine_warmup # cosine_warmup (default), null (no scheduler)
    warmup_epochs: 4

# ------------------------------------------------------------------------------------------------------------------- #

train: 
    seed: 10 # int or null for no seed
    matmul_precision: highest # highest (default), high, medium
    precision: bf16-mixed # 64 (double), 32 (full), 16 (16bit mixed), bf16-mixed (bfloat16 mixed). Defaults to 32.
    epochs: 20
    batch_size: 300
    accumulate_grad_batches: 1 # 1 (default, no accumulation)
    device: cuda
    resume: False 
    resume_from: null 
    checkpointing:
        monitor: "metric/val/dist" # "metric/val/dist" (default), "loss/val", etc.
        mode: "min" # "min" (default), "max"
    freeze:
        gaze_encoder: False 
        image_tokenizer: False
        image_encoder: True
        gaze_decoder: False
    swa:
        use: True
        lr: 1e-5
        epoch_start: 17
        annealing_epochs: 3

# ------------------------------------------------------------------------------------------------------------------- #

val: 
    checkpoint: null
    batch_size: 128
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

test:
    checkpoint: null
    batch_size: 128
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

wandb:
    log: True
    entity: semgaze # /!\ null, or your wandb entity
    watch: all # /!\ null, gradients, parameters, all
    watch_freq: 500

# ------------------------------------------------------------------------------------------------------------------- #

hydra: 
    run: 
        dir: ./
    sweep:
        dir: ${hydra.run.dir}
        subdir: ${hydra.job.num}
    job: 
        chdir: False

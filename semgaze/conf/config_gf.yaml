# ==================================================================================================================== #
#                                                EXPERIMENT CONFIGURATION                                              # 
# ==================================================================================================================== #


project:
    name: semgaze # name of the wandb project
    version: 1.0.0
    description: SemGaze - Transformer encoder-decoder architecture for gaze target localization and recognition.
    root: /home/elicer/semgaze # FILL ME

# ------------------------------------------------------------------------------------------------------------------- #

experiment:
    name: SOTA(448->512), BCE # name of the wandb job
    group: null # name of the wandb group
    task: train+test # combination of {train, val, test} separated by '+' sign
    dataset: gazefollow # gazefollow, gazehoi

# ------------------------------------------------------------------------------------------------------------------- #

data:
    num_people: 1 # int or -1 to include all people
    image_size: 512
    heatmap_size: 64 # 64
    heatmap_sigma: 3
    return_head_mask: False
    gf:
        root: /home/elicer/semgaze/data/gazefollow_extended # FILL ME
        root_heads: /home/elicer/semgaze/data/GazeFollow-head # FILL ME (if needed)
        reasoning_feature_root: /home/elicer/semgaze/data/gazefollow_reason/features/reasoning_only
        object_feature_root: /home/elicer/semgaze/data/gazefollow_reason/features/object_only
        num_train_samples: 108955
        vocab_size: 346
    gazehoi:
        root: /home/elicer/semgaze/data/gazehoi # FILL ME
        num_train_samples: 47044
        vocab_size: 463


# ------------------------------------------------------------------------------------------------------------------- #

model:
    semgaze:
        patch_size: 16
        token_dim: 768 # Decoder token dim (image encoder output is projected to this dim)
        image_size: ${data.image_size}
        gaze_vec_dim: 2
        image_encoder:
            name: facebook/dinov3-vitl16-pretrain-lvd1689m # facebook/dinov3-vitl16-pretrain-lvd1689m or facebook/dinov3-vitb16-pretrain-lvd1689m
            freeze: True
            unfreeze_last_n_blocks: 0
            lora:
                enabled: False
                r: 8
                alpha: 16
                dropout: 0.05
                target_modules: [auto] # auto or explicit names
        image_to_decoder_proj:
            enabled: True # set False to bypass projection (requires image encoder hidden size == token_dim)
        decoder_depth: 2
        decoder_num_heads: 8
        temp_init_value: 0.07
    pretraining:
        gaze_backbone: /home/elicer/semgaze/weights/gaze360_resnet18.pt # FILL ME
    weights: null # /!\ null (default), or path to a checkpoint (overrides pretraining weights)

# ------------------------------------------------------------------------------------------------------------------- #

loss:
    weight_heatmap: 100
    heatmap_loss_fn: bce # mse | bce
    weight_angular: 3 # 3
    weight_label: 1 # 1
    label_objective: global_vocab_ce # legacy_infonce | global_vocab_ce
    label_margin_type: none # none, cosface, arcface
    label_margin: 0.0
    label_easy_margin: False
    weight_align_reasoning: 0.5 # reasoning-only alignment loss weight
    weight_align_object: 0.5 # object-only alignment loss weight

# ------------------------------------------------------------------------------------------------------------------- #

alignment_reasoning:
    enabled: True
    train_only: True
    head_type: mlp # mlp | projection
    feature_dim: 1024
    layer_index: 1 # 1-based index in decoder transformer depth
    loss_type: infonce # cosine, mse, infonce
    head_lr_mult: 3.0
    temp_init_value: 0.07 # used when loss_type=infonce
    reasoning_log_limit: 20

alignment_object:
    enabled: True
    train_only: True
    head_type: mlp # mlp | projection
    feature_dim: 1024
    loss_type: infonce # cosine, mse, infonce
    head_lr_mult: 3.0
    temp_init_value: 0.07 # used when loss_type=infonce

# ------------------------------------------------------------------------------------------------------------------- #

optimizer:
    lr: 2e-4
    weight_decay: 3e-3

# ------------------------------------------------------------------------------------------------------------------- #

scheduler:
    type: cosine_warmup # cosine_warmup (default), null (no scheduler)
    warmup_epochs: 4

# ------------------------------------------------------------------------------------------------------------------- #

train: 
    seed: 10 # int or null for no seed
    matmul_precision: highest # highest (default), high, medium
    precision: bf16-mixed # 64 (double), 32 (full), 16 (16bit mixed), bf16-mixed (bfloat16 mixed). Defaults to 32.
    epochs: 20
    batch_size: 300 #300
    accumulate_grad_batches: 1 # 1 (default, no accumulation)
    device: cuda
    resume: False 
    resume_from: null 
    checkpointing:
        monitor: "metric/val/dist" # "metric/val/dist" (default), "loss/val", etc.
        mode: "min" # "min" (default), "max"
    freeze:
        gaze_encoder: False 
        image_tokenizer: False
        gaze_decoder: False
    swa:
        use: True
        lr: 1e-5
        epoch_start: 17
        annealing_epochs: 3

# ------------------------------------------------------------------------------------------------------------------- #

val: 
    checkpoint: null
    batch_size: 128
    device: ${train.device}

# ------------------------------------------------------------------------------------------------------------------- #

test:
    checkpoint: null
    batch_size: 128
    device: ${train.device}
    l2_eval_mode: argmax # argmax (official-style), dark (optional)
    tta:
        enabled: False
        hflip: True

# ------------------------------------------------------------------------------------------------------------------- #

wandb:
    log: True
    entity: semgaze # /!\ null, or your wandb entity
    watch: all # /!\ null, gradients, parameters, all
    watch_freq: 500

# ------------------------------------------------------------------------------------------------------------------- #

hydra: 
    run: 
        dir: ./
    sweep:
        dir: ${hydra.run.dir}
        subdir: ${hydra.job.num}
    job: 
        chdir: False
